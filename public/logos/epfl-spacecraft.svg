<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Satellite body -->
  <rect x="35" y="35" width="30" height="30" rx="3" fill="#E8232A" stroke="#C41E24" stroke-width="1"/>
  <!-- Solar panels -->
  <rect x="5" y="40" width="25" height="20" rx="2" fill="#2D3748" stroke="#4A5568" stroke-width="1"/>
  <rect x="70" y="40" width="25" height="20" rx="2" fill="#2D3748" stroke="#4A5568" stroke-width="1"/>
  <!-- Panel lines -->
  <line x1="13" y1="40" x2="13" y2="60" stroke="#4A5568" stroke-width="0.5"/>
  <line x1="21" y1="40" x2="21" y2="60" stroke="#4A5568" stroke-width="0.5"/>
  <line x1="78" y1="40" x2="78" y2="60" stroke="#4A5568" stroke-width="0.5"/>
  <line x1="86" y1="40" x2="86" y2="60" stroke="#4A5568" stroke-width="0.5"/>
  <!-- Antenna -->
  <line x1="50" y1="35" x2="50" y2="18" stroke="#2D3748" stroke-width="2"/>
  <circle cx="50" cy="15" r="4" fill="none" stroke="#2D3748" stroke-width="1.5"/>
  <!-- EPFL text on body -->
  <text x="50" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#fff">EPFL</text>
  <!-- Stars -->
  <circle cx="15" cy="15" r="1" fill="#CBD5E0"/>
  <circle cx="85" cy="20" r="1.2" fill="#CBD5E0"/>
  <circle cx="75" cy="80" r="0.8" fill="#CBD5E0"/>
  <circle cx="25" cy="85" r="1" fill="#CBD5E0"/>
</svg>
